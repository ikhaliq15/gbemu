name: CI for PR Merge
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pre-commit/action@v3.0.0

  build_and_test:
    runs-on: ubuntu-latest
    needs: [pre-commit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0

      - name: Set up Bazel cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/*.bazelrc') }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Compute impacted targets for PR
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          OUTPUT_DIR="${RUNNER_TEMP}/bazel-diff"
          bash .github/scripts/compute_impacted_targets.sh \
            "${GITHUB_WORKSPACE}" \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "${OUTPUT_DIR}"

          grep -v '^//dist/' "${OUTPUT_DIR}/impacted-targets.txt" > "${OUTPUT_DIR}/linux-impacted-targets.txt" || true

          if [[ -s "${OUTPUT_DIR}/linux-impacted-targets.txt" ]]; then
            IMPACTED_LABELS="$(paste -sd ' ' "${OUTPUT_DIR}/linux-impacted-targets.txt")"
            bazel query "tests(set(${IMPACTED_LABELS}))" > "${OUTPUT_DIR}/linux-impacted-tests.txt"
          else
            : > "${OUTPUT_DIR}/linux-impacted-tests.txt"
          fi

          echo "Impacted Linux targets:"
          cat "${OUTPUT_DIR}/linux-impacted-targets.txt" || true

          echo "Impacted Linux tests:"
          cat "${OUTPUT_DIR}/linux-impacted-tests.txt" || true

      - name: Upload impacted target lists
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: bazel-diff-linux-targets
          path: |
            ${{ runner.temp }}/bazel-diff/impacted-targets.txt
            ${{ runner.temp }}/bazel-diff/linux-impacted-targets.txt
            ${{ runner.temp }}/bazel-diff/linux-impacted-tests.txt
          if-no-files-found: error

      - name: Build the project
        shell: bash
        run: |
          PKG_CONFIG_PATH="$(pkg-config --variable pc_path pkg-config)"
          read -r -a GTK_LINK_FLAGS <<< "$(pkg-config --libs gtk+-3.0)"
          LINKOPTS=()
          for flag in "${GTK_LINK_FLAGS[@]}"; do
            LINKOPTS+=("--linkopt=${flag}")
          done
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TARGET_FILE="${RUNNER_TEMP}/bazel-diff/linux-impacted-targets.txt"
            if [[ ! -s "${TARGET_FILE}" ]]; then
              echo "No impacted Linux targets to build."
              exit 0
            fi
            mapfile -t TARGETS < "${TARGET_FILE}"
            bazel build \
              --action_env=PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" \
              --host_action_env=PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" \
              --action_env=PKG_CONFIG_LIBDIR="${PKG_CONFIG_PATH}" \
              --host_action_env=PKG_CONFIG_LIBDIR="${PKG_CONFIG_PATH}" \
              "${LINKOPTS[@]}" \
              --skip_incompatible_explicit_targets -- "${TARGETS[@]}"
          else
            bazel build \
              --action_env=PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" \
              --host_action_env=PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" \
              --action_env=PKG_CONFIG_LIBDIR="${PKG_CONFIG_PATH}" \
              --host_action_env=PKG_CONFIG_LIBDIR="${PKG_CONFIG_PATH}" \
              "${LINKOPTS[@]}" \
              --skip_incompatible_explicit_targets -- //... -//dist/...
          fi

      - name: Run tests
        shell: bash
        run: |
          PKG_CONFIG_PATH="$(pkg-config --variable pc_path pkg-config)"
          read -r -a GTK_LINK_FLAGS <<< "$(pkg-config --libs gtk+-3.0)"
          LINKOPTS=()
          for flag in "${GTK_LINK_FLAGS[@]}"; do
            LINKOPTS+=("--linkopt=${flag}")
          done
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TARGET_FILE="${RUNNER_TEMP}/bazel-diff/linux-impacted-tests.txt"
            if [[ ! -s "${TARGET_FILE}" ]]; then
              echo "No impacted Linux tests to run."
              exit 0
            fi
            mapfile -t TARGETS < "${TARGET_FILE}"
            bazel test \
              --action_env=PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" \
              --host_action_env=PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" \
              --action_env=PKG_CONFIG_LIBDIR="${PKG_CONFIG_PATH}" \
              --host_action_env=PKG_CONFIG_LIBDIR="${PKG_CONFIG_PATH}" \
              "${LINKOPTS[@]}" \
              --skip_incompatible_explicit_targets -- "${TARGETS[@]}"
          else
            bazel test \
              --action_env=PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" \
              --host_action_env=PKG_CONFIG_PATH="${PKG_CONFIG_PATH}" \
              --action_env=PKG_CONFIG_LIBDIR="${PKG_CONFIG_PATH}" \
              --host_action_env=PKG_CONFIG_LIBDIR="${PKG_CONFIG_PATH}" \
              "${LINKOPTS[@]}" \
              --skip_incompatible_explicit_targets -- //... -//dist/...
          fi

      - name: Upload Bazel test logs
        uses: actions/upload-artifact@v6
        with:
          name: bazel-test-logs
          path: bazel-testlogs/
          if-no-files-found: warn
        if: always()

  build_macos_bundle:
    runs-on: macos-latest
    needs: [pre-commit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0

      - name: Set up Bazel cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/*.bazelrc') }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Compute impacted targets for PR
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          OUTPUT_DIR="${RUNNER_TEMP}/bazel-diff"
          bash .github/scripts/compute_impacted_targets.sh \
            "${GITHUB_WORKSPACE}" \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            "${OUTPUT_DIR}"

          if grep -qx '//dist/macos:GBEmu' "${OUTPUT_DIR}/impacted-targets.txt"; then
            echo "BUILD_MACOS_BUNDLE=true" >> "${GITHUB_ENV}"
          else
            echo "BUILD_MACOS_BUNDLE=false" >> "${GITHUB_ENV}"
          fi

          echo "Impacted macOS targets:"
          cat "${OUTPUT_DIR}/impacted-targets.txt" || true

      - name: Build macOS app bundle
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${BUILD_MACOS_BUNDLE:-false}" != "true" ]]; then
            echo "The macOS app bundle is not impacted by this pull request."
            exit 0
          fi

          bazel build //dist/macos:GBEmu
