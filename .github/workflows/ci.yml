name: CI for PR Merge
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pre-commit/action@v3.0.0

  build_and_test:
    runs-on: ubuntu-latest
    needs: [pre-commit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0

      - name: Set up Bazel cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/*.bazelrc') }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Build the project
        run: bazel build --skip_incompatible_explicit_targets -- //... -//dist/...

      - name: Run tests
        run: bazel test --skip_incompatible_explicit_targets -- //... -//dist/...

      - name: Upload Bazel test logs
        uses: actions/upload-artifact@v6
        with:
          name: bazel-test-logs
          path: bazel-testlogs/
          if-no-files-found: warn
        if: always()

  build_macos_bundle:
    runs-on: macos-latest
    needs: [pre-commit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0

      - name: Set up Bazel cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/bazel
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/*.bazelrc') }}-${{ hashFiles('MODULE.bazel', 'WORKSPACE') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Build macOS app bundle
        run: bazel build //dist/macos:GBEmuv3
