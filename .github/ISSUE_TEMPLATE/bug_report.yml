name: Bug report
description: Report an emulator bug, regression, or crash.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Please include enough detail for someone else to reproduce it without access to your local setup.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include ROM, settings, and exact actions if relevant.
      placeholder: |
        1. Launch GBEmu
        2. Open ...
        3. Press ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, GBEmu version, and any other useful context.
      placeholder: |
        OS:
        GBEmu version:
        Build source:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or additional context
      description: Paste terminal output or attach screenshots if helpful.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched for existing issues covering this problem.
          required: true
        - label: I have not attached or linked to copyrighted commercial ROM files.
          required: true
